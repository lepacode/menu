<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/inscripciones.css">
    <title>Participa y Gana</title>
</head>

<body>

    <!-- Video de fondo -->
    <video class="bg-video" src="assets/fondo.mp4" autoplay muted loop playsinline></video>
    <div class="bg-overlay"></div>

    <!-- Header 20dvh: logo 120px izq, imagen 150px der -->
    <header>
        <div class="header__logo" aria-label="Logo">
            <img src="assets/logo.webp" alt="Logo"
                style="width:100%;height:100%;object-fit:contain;border-radius:inherit;">
        </div>
        <div class="header__image" aria-label="Sorteo">
            <img src="assets/sorteo.webp" alt="Sorteo"
                style="width:100%;height:100%;object-fit:contain;border-radius:inherit;">
        </div>
    </header>

    <!-- Main 80dvh -->
    <main>

        <!-- Imagen central 50dvh -->
        <section class="content">
            <div class="content__image" aria-label="Menú">
                <img src="assets/menu.webp" alt="Menú" style="width:100%;height:100%;object-fit:contain;">
            </div>
        </section>

        <!-- Formulario 30dvh -->
        <section class="prize">
            <h2 class="prize__title">Completa tus datos para participar</h2>
            <div class="prize__form">
                <input class="prize__input" type="text" placeholder="Tu nombre..." id="nombre" aria-label="Tu nombre"
                    autocomplete="name">
                <input class="prize__input" type="tel" placeholder="Tu telefono ej. 55 1234 5697" id="telefono"
                    aria-label="Tu telefono" autocomplete="tel">
                <button class="prize__button" id="btnEnviar" type="button">Enviar</button>
            </div>
        </section>

    </main>

    <!-- Toast -->
    <div class="toast" id="toast" role="alert" aria-live="polite"></div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox__confetti" id="confettiContainer"></div>
        <div class="lightbox__contenido">
            <div class="lightbox__header">
                <div class="lightbox__trofeo">🏆</div>
                <div class="lightbox__estrellas">
                    <span class="estrella">⭐</span>
                    <span class="estrella">⭐</span>
                    <span class="estrella">⭐</span>
                </div>
            </div>
            <div class="lightbox__cuerpo">
                <h2 class="lightbox__titulo">¡Felicitaciones,<br><span class="lightbox__nombre-accent" id="lightboxNombre">participante</span>!</h2>
                <p class="lightbox__subtitulo">Ya estás participando por la cena para 4 personas 🍽️</p>
                <div class="lightbox__detalles">
                    <p class="lightbox__detalle-item">📢 Te avisaremos si resultás ganador</p>
                    <p class="lightbox__detalle-item">🍀 ¡Mucha suerte en el sorteo!</p>
                </div>
                <button class="lightbox__btn" id="lightboxClose">Aceptar</button>
            </div>
        </div>
    </div>

    <script src="js/inscripciones.js"></script>

</body>

</html>
